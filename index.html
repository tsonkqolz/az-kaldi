<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imtihana Geri Sayım </title>
    <!-- Import Space Grotesk for geometric numbers and Open Sans for highly readable labels -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <!-- Minimalist Countdown Display with Turkish labels -->
        <div class="timer" id="timer">
            <div class="time-block">
                <span class="unit" id="days">00</span>
                <span class="label">gün</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="unit" id="hours">00</span>
                <span class="label">saat</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="unit" id="minutes">00</span>
                <span class="label">dakika</span>
            </div>
            <span class="separator">:</span>
            <div class="time-block">
                <span class="unit" id="seconds">00</span>
                <span class="label">saniye</span>
            </div>
        </div>

        <!-- Simple Countdown Display -->
        <div class="timer simple-timer hidden" id="simple-timer">
            <span class="unit" id="simple-days">00</span>
            <span class="simple-label" id="simple-label">
                <span id="simple-label-first">gün</span>
                <span id="simple-label-second">kaldı</span>
            </span>
        </div>
    </main>

    <!-- Settings Button (Bottom Left) -->
    <button id="settings-toggle" class="settings-btn" aria-label="Hedef Tarihi Değiştir">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
        </svg>
    </button>

    <!-- Fullscreen Button (Bottom Left, beside Settings) -->
    <button id="fullscreen-toggle" class="fullscreen-btn" aria-label="Tam Ekran Yap">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-maximize">
            <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
            <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
            <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
            <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
        </svg>
    </button>

    <!-- Settings Panel (Bottom Left) -->
    <div id="settings-panel" class="settings-panel hidden">
        <div class="panel-header">
            <h3>Hedef Tarihi Değiştir</h3>
            <button id="settings-close" class="close-btn" aria-label="Kapat">&times;</button>
        </div>
        <div class="panel-body">
            <div class="input-group">
                <label for="target-datetime">Yeni Tarih ve Saat</label>
                <input type="datetime-local" id="target-datetime">
            </div>
            <div class="button-group">
                <button id="save-settings" class="btn btn-primary">Kaydet</button>
                <button id="reset-settings" class="btn btn-secondary">Sıfırla</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
